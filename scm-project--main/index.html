<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCM Demo Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    Sample WEbsite
</header>

<div class="box">
    <p id="feature">Feature not triggered</p>
    <button onclick="featureChange()">Run Feature</button>
    <h1>Welcome</h1>
    <h2>UI Improved by Teena</h2>
    <p>This is a colorful HTML page for demonstrating Git version control.</p>
    <button onclick="changeText()">Click Me</button>
    <p id="text">Version 1</p>
</div>

<footer>
    Created for SCM Demonstration
</footer>

<script>
    function featureChange() {
    document.getElementById("feature").innerText = "Feature executed!";
}
    function changeText() {
        document.getElementById("text").innerText = "Button Clicked!";
    }
</script>

</body>
</html>
